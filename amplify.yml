version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Setup Node.js 22 (required by package.json engines)
        - nvm install 22
        - nvm use 22
        - echo "Node version:" && node -v
        
        # Setup pnpm (specified in package.json packageManager)
        - corepack enable
        - corepack prepare pnpm@9.15.0 --activate
        - echo "pnpm version:" && pnpm -v
        
        - echo "Starting preBuild phase..."
        
        # Fetch secrets from Secrets Manager (not exposed in Amplify Console)
        - echo "Fetching secrets from Secrets Manager..."
        - echo "SECRETS_NAME=$SECRETS_NAME"
        - export SECRETS=$(aws secretsmanager get-secret-value --secret-id "$SECRETS_NAME" --query SecretString --output text --region us-east-2)
        - echo "SECRETS retrieved, length=${#SECRETS}"
        # Parse JSON using Node.js (jq not available in Amplify build environment)
        - export COINBASE_COMMERCE_API_KEY=$(node -e "console.log(JSON.parse(process.env.SECRETS).COINBASE_COMMERCE_API_KEY)")
        - export COINBASE_COMMERCE_API_SECRET=$(node -e "console.log(JSON.parse(process.env.SECRETS).COINBASE_COMMERCE_API_SECRET)")
        - export COINBASE_COMMERCE_WEBHOOK_SECRET=$(node -e "console.log(JSON.parse(process.env.SECRETS).COINBASE_COMMERCE_WEBHOOK_SECRET)")
        - export NEXT_PUBLIC_PROJECT_ID=$(node -e "console.log(JSON.parse(process.env.SECRETS).NEXT_PUBLIC_PROJECT_ID)")
        # Verify secrets were extracted (show first 4 chars + masked remainder)
        - echo "Validating extracted secrets..."
        - 'echo "COINBASE_COMMERCE_API_KEY: ${COINBASE_COMMERCE_API_KEY:0:4}****** (length: ${#COINBASE_COMMERCE_API_KEY})"'
        - 'echo "COINBASE_COMMERCE_API_SECRET: ${COINBASE_COMMERCE_API_SECRET:0:4}****** (length: ${#COINBASE_COMMERCE_API_SECRET})"'
        - 'echo "COINBASE_COMMERCE_WEBHOOK_SECRET: ${COINBASE_COMMERCE_WEBHOOK_SECRET:0:4}****** (length: ${#COINBASE_COMMERCE_WEBHOOK_SECRET})"'
        - 'echo "NEXT_PUBLIC_PROJECT_ID: ${NEXT_PUBLIC_PROJECT_ID:0:4}****** (length: ${#NEXT_PUBLIC_PROJECT_ID})"'
        - echo "Secrets loaded successfully"
        
        # Install dependencies using pnpm
        - pnpm install --frozen-lockfile
        - echo "Dependencies installed successfully"
    build:
      commands:
        - echo "Starting build phase..."
        # Generate build version for cache busting and debugging
        - echo "export const BUILD_VERSION = '$(date +"%Y%m%d-%H%M")';" > src/lib/build-version.ts
        - cat src/lib/build-version.ts
        - pnpm run build
        - echo "Build completed successfully"
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .pnpm-store/**/*
      - .next/cache/**/* 