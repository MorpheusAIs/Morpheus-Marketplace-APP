version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Setup Node.js 22 (required by package.json engines)
        - nvm install 22
        - nvm use 22
        - echo "Node version:" && node -v
        
        # Setup pnpm (specified in package.json packageManager)
        - corepack enable
        - corepack prepare pnpm@9.15.0 --activate
        - echo "pnpm version:" && pnpm -v
        
        - echo "Starting preBuild phase..."
        
        # Install dependencies using pnpm
        - pnpm install --frozen-lockfile
        - echo "Dependencies installed successfully"
    build:
      commands:
        - echo "Starting build phase..."
        
        # Write environment variables to .env for Lambda runtime access
        # This is required for WEB_COMPUTE platform to pass env vars to API routes
        # Using printf instead of echo to avoid secrets appearing in build logs
        - printf "COINBASE_COMMERCE_API_KEY=%s\n" "$COINBASE_COMMERCE_API_KEY" >> .env.production
        - printf "COINBASE_COMMERCE_API_SECRET=%s\n" "$COINBASE_COMMERCE_API_SECRET" >> .env.production
        - printf "COINBASE_COMMERCE_WEBHOOK_SECRET=%s\n" "$COINBASE_COMMERCE_WEBHOOK_SECRET" >> .env.production
        - printf "STRIPE_WEBHOOK_SECRET=%s\n" "$STRIPE_WEBHOOK_SECRET" >> .env.production
        - printf "STRIPE_SECRET_KEY=%s\n" "$STRIPE_SECRET_KEY" >> .env.production
        - printf "ADMIN_API_SECRET=%s\n" "$ADMIN_API_SECRET" >> .env.production
        - echo "Environment variables written to .env.production for Lambda runtime"
        
        # Generate build version for cache busting and debugging
        - echo "export const BUILD_VERSION = '$(date +"%Y%m%d-%H%M")';" > src/lib/build-version.ts
        - cat src/lib/build-version.ts
        - pnpm run build
        - echo "Build completed successfully"
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .pnpm-store/**/*
      - .next/cache/**/* 